<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Hand Sign Web</title>
  <style>
    body { font-family: Arial, sans-serif; display:flex; gap:20px; padding:20px; }
    #video-box { position: relative; width: 640px; }
    #video-box img { width:100%; height:auto; display:block; }
    #overlay {
      position: absolute;
      left: 8px;
      top: 8px;
      background: rgba(0,0,0,0.4);
      color: white;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 18px;
    }
    #info { max-width: 420px; }
  </style>
</head>
<body>
  <div id="video-box">
    <img id="video" src="/video_feed" alt="video feed">
    <div id="overlay">waiting...</div>
  </div>

  <div id="info">
    <h3>Status</h3>
    <p>Label: <span id="label">-</span></p>
    <p>Confidence: <span id="conf">-</span></p>
    <p>Catatan: Browser akan mengucapkan label jika confidence &gt; 0.8.</p>
  </div>

<script>
const overlay = document.getElementById('overlay');
const labelSpan = document.getElementById('label');
const confSpan = document.getElementById('conf');

let lastSpoken = "";
let lastSpeakTime = 0;
const speakInterval = 2000; // ms

const evtSource = new EventSource('/label_stream');
evtSource.onmessage = (e) => {
  try {
    const obj = JSON.parse(e.data);
    const label = obj.label || "";
    const conf = obj.confidence || 0;
    overlay.textContent = label ? `${label} (${(conf*100).toFixed(1)}%)` : "No hands";
    labelSpan.textContent = label || "-";
    confSpan.textContent = (conf*100).toFixed(1) + "%";

    if (label && conf > 0.8) {
      const now = Date.now();
      if (label !== lastSpoken || (now - lastSpeakTime) > speakInterval) {
        // use browser speechSynthesis
        const utter = new SpeechSynthesisUtterance(label);
        utter.rate = 1.0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
        lastSpoken = label;
        lastSpeakTime = now;
      }
    }
  } catch (err) {
    // ignore keep-alive comments
  }
};
</script>
</body>
</html>
